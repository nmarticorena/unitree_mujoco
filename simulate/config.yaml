robot: "g1"  # Robot name, "go2", "b2", "b2w", "h1", "go2w", "g1", "h2"
robot_scene: "dolly_scene.xml" # Robot scene, /unitree_robots/[robot]/scene.xml 

domain_id: 1  # Domain id
interface: "lo" # Interface 

use_joystick: 1 # Simulate Unitree WirelessController using a gamepad
joystick_type: "xbox" # support "xbox" and "switch" gamepad layout
joystick_device: "/dev/input/js0" # Device path
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy

print_scene_information: 0 # Print link, joint and sensors information of robot

enable_elastic_band: 1 # Virtual spring band, used for lifting humanoid robots
elastic_band_height: 1.7 # Default rope/elastic-band anchor height in metres
elastic_band_topic: "rt/elastic_band" # std_msgs/msg/String: enable or disable

# Reset the complete MuJoCo state and randomize the configured scene body pose.
# Publish a non-negative integer as std_msgs/msg/String. Publish -1 for a hard
# reset to the model defaults without pose randomization.
enable_scene_reset: 1
scene_reset_topic: "rt/reset_category"
dolly_reset_topic: "rt/reset_dolly" # Any std_msgs/msg/String message resets only the dolly
scene_reset_body: "dolly"
scene_reset_pose:
  position: [2.5, 0.0, 0.45]        # Centre of the sampling region [m]
  position_margin: [1.0, 1.0, 0.0] # Uniform +/- margin on [x, y, z] [m]
  yaw: 0.0                           # Centre yaw [rad]
  yaw_margin: 3.14                    # Uniform +/- yaw margin [rad]

publish_object_pose: 1 # Publish a MuJoCo body pose through DDS as geometry_msgs/msg/PoseStamped
# For multiple objects, keep publish_object_pose: 1 and use this list.
# When this list is present, it replaces the single object_pose_* settings above.
object_pose_publishers:
  - body: "dolly"
    topic: "rt/dolly_pose"
    frame: "world"
    rate_hz: 50
  - body: "pelvis"
    topic: "rt/torso_pose"
    frame: "world"
    rate_hz: 50

publish_camera: 0 # Publish camera RGB/depth through DDS as unitree_go::msg::dds_::Go2FrontVideoData_
camera_name: "head_camera"
camera_topic: "rt/head_camera/front_video"
camera_frame: "head_camera"
camera_width: 640
camera_height: 480
camera_rate_hz: 15

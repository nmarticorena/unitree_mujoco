robot: "g1"  # Robot name, "go2", "b2", "b2w", "h1", "go2w", "g1", "h2"
robot_scene: "dolly_scene.xml" # Robot scene, /unitree_robots/[robot]/scene.xml 

domain_id: 1  # Domain id
interface: "lo" # Interface 

use_joystick: 1 # Simulate Unitree WirelessController using a gamepad
joystick_type: "xbox" # support "xbox" and "switch" gamepad layout
joystick_device: "/dev/input/js0" # Device path
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy

print_scene_information: 0 # Print link, joint and sensors information of robot

enable_elastic_band: 1 # Virtual spring band, used for lifting h1

publish_object_pose: 1 # Publish a MuJoCo body pose through DDS as geometry_msgs/msg/PoseStamped
# For multiple objects, keep publish_object_pose: 1 and use this list.
# When this list is present, it replaces the single object_pose_* settings above.
object_pose_publishers:
  - body: "dolly"
    topic: "rt/dolly_pose"
    frame: "world"
    rate_hz: 50
  - body: "pelvis"
    topic: "rt/torso_pose"
    frame: "world"
    rate_hz: 50

publish_camera: 0 # Publish camera RGB/depth through DDS as unitree_go::msg::dds_::Go2FrontVideoData_
camera_name: "head_camera"
camera_topic: "rt/head_camera/front_video"
camera_frame: "head_camera"
camera_width: 640
camera_height: 480
camera_rate_hz: 15
